<style>
  :root{
    --bg: #cbc7ac;
    --line: rgba(0,0,0,0.08);
    --ink: #1c1c1a;
    --ink-light: rgba(28,28,26,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink);
    height: 100%;
    scroll-behavior: smooth;
  }

  body { overflow-x: hidden; }

  /* ===================== LOADER ===================== */
  .loader-wrap {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
  }

  .loader-panel {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    transition: transform 1.1s cubic-bezier(0.76, 0, 0.24, 1);
  }

  .loader-panel.left  { left: 0; transform-origin: left; }
  .loader-panel.right { right: 0; transform-origin: right; }

  /* mall-door split: left slides left, right slides right */
  .loader-wrap.open .loader-panel.left  { transform: translateX(-100%); }
  .loader-wrap.open .loader-panel.right { transform: translateX(100%); }

  /* thin center seam line for the "doors" look */
  .loader-panel::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(236,233,221,0.15);
  }
  .loader-panel.left::after  { right: 0; }
  .loader-panel.right::after { left: 0; }

  /* ===================== HERO ===================== */
  .hero {
    position: relative;
    min-height: 100vh;
    width: 100%;
    background-color: var(--bg);
    overflow: hidden;
    scroll-margin-top: 0;
  }

  /* grid texture */
  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 1;
  }

  /* paper grain */
  .hero::after {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.5;
    pointer-events: none;
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/></svg>");
    mix-blend-mode: multiply;
  }

  /* ===== NAVBAR ===== */
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .nav-brand {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-decoration: none;
    color: var(--ink);
  }

  .nav-links {
    display: flex;
    list-style: none;
    gap: 8px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 50px;
    padding: 6px 8px;
  }

  .nav-links a {
    display: block;
    padding: 10px 22px;
    text-decoration: none;
    color: var(--ink-light);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    border-radius: 50px;
    transition: all 0.3s ease;
  }

  .nav-links a:hover {
    color: var(--ink);
    background: rgba(255,255,255,0.4);
  }

  .nav-links a.active {
    color: var(--ink);
    background: rgba(255,255,255,0.6);
    font-weight: 600;
  }

  .nav-cta {
    padding: 12px 28px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .nav-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(28,28,26,0.25);
  }

  /* ===== HERO HEADLINE ===== */
  .hero-headline {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    text-align: center;
  }

  .hero-headline h1 {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
  }

  .hero-headline .line {
    display: block;
  }

  .hero-headline .outline {
    color: transparent;
    -webkit-text-stroke: 1.5px var(--ink);
  }

  .hero-headline .accent {
    display: inline-block;
    color: #1a4fd6;
    text-decoration: underline;
    text-decoration-thickness: 3px;
    text-underline-offset: 8px;
    transform: rotate(-2deg);
  }

  /* ===== IMAGES (same as original) ===== */
  .hero-img {
    position: absolute;
    object-fit: cover;
    z-index: 3;
  }

  .img-left-top {
    width: 230px;
    height: 200px;
    top: 100px;
    left: 90px;
  }

  .img-left-bottom {
    width: 200px;
    height: 200px;
    bottom: 10px;
    left: 90px;
  }

  .img-right-top {
    width: auto;
    height: 200px;
    top: 50px;
    right: 10px;
  }

  .img-right-bottom {
    width: auto;
    height: auto;
    bottom: 20px;
    right: 70px;
  }

  @media (prefers-reduced-motion: reduce) {
    .loader-panel { transition: none; }
  }
</style>

<style>
    .section {
        position: relative;
        width: 100%;
        height: 1000px;
        overflow: hidden;
        background-color: #ffffff;

            linear-gradient(to right, rgba(0,0,0,0.06) 1px, transparent 1px),

<script>
  // ============================================================
  // HERO LOADER -> door-split-open on page load
  // Runs independently, BEFORE the GSAP/CDN scripts, so a slow or
  // blocked CDN request can never leave the loader stuck.
  // Has a hard fallback timeout so it always opens no matter what.
  // ============================================================
  (function () {
    var wrap = document.getElementById('loaderWrap');
    var opened = false;

    function openDoors() {
      if (opened) return;
      opened = true;
      wrap.classList.add('open');
      setTimeout(function () {
        wrap.style.display = 'none';
      }, 1200);
    }

    if (document.readyState === 'complete') {
      setTimeout(openDoors, 300);
    } else {
      window.addEventListener('load', function () {
        setTimeout(openDoors, 300);
      });
    }

    // Failsafe: force-open after 4s no matter what
    setTimeout(openDoors, 4000);
  })();
</script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<script>
    // ============================================================
    // ENTER METRO -> door-split-open (SECTION 2 ONLY)
    // ============================================================
    (function () {
        const btn = document.getElementById('enterBtn');
        const wrap = document.getElementById('introWrap');
        const halfLeft = document.getElementById('halfLeft');
        const halfRight = document.getElementById('halfRight');

        btn.addEventListener('click', () => {
            wrap.classList.add('opening');
            halfLeft.classList.add('slide-left');
            halfRight.classList.add('slide-right');

            setTimeout(() => {
                wrap.style.display = 'none';
            }, 1150);
        });
    })();
</script>

<script>
    const track = document.querySelector('.bg-track');
    const slides = document.querySelectorAll('.bg-slide');
    let current = 0;

    function showSlide(i) {
        current = (i + slides.length) % slides.length; // infinite loop
        track.style.transform = `translateX(-${current * 100}%)`;
    }

    document.querySelector('.arrow-right').addEventListener('click', () => showSlide(current + 1));
    document.querySelector('.arrow-left').addEventListener('click', () => showSlide(current - 1));
</script>

<script>
    gsap.registerPlugin(ScrollTrigger);

    const svgNS = "http://www.w3.org/2000/svg";
    const lineSvg = document.getElementById("lineSvg");
    const originalPath = document.getElementById("linePath");
    const fullD = originalPath.getAttribute("d");

    const segmentsD = fullD
        .split(/(?=M)/)
        .map(s => s.trim())
        .filter(s => s.length > 0);

    const dotEls = [];
    const masterPoints = [];
    const SAMPLES_PER_SEGMENT = 30;
    const DOT_MAX_SIZE = 30;

    segmentsD.forEach(d => {
        const temp = document.createElementNS(svgNS, "path");
        temp.setAttribute("d", d);
        temp.setAttribute("fill", "#0F5CDE");
        temp.style.opacity = "0";
        lineSvg.appendChild(temp);

        const bbox = temp.getBBox();

        if (bbox.width < DOT_MAX_SIZE && bbox.height < DOT_MAX_SIZE) {
            dotEls.push(temp);
            return;
        }

        const total = temp.getTotalLength();
        for (let i = 0; i <= SAMPLES_PER_SEGMENT; i++) {
            const len = (total / 2) * (i / SAMPLES_PER_SEGMENT);
            const pt = temp.getPointAtLength(len);
            masterPoints.push(pt);
        }

        temp.remove();
    });

    originalPath.remove();

    let spineD = "";
    masterPoints.forEach((pt, i) => {
        spineD += (i === 0 ? "M" : "L") + pt.x.toFixed(2) + "," + pt.y.toFixed(2) + " ";
    });

    const spinePath = document.createElementNS(svgNS, "path");
    spinePath.setAttribute("d", spineD);
    spinePath.setAttribute("fill", "none");
    spinePath.setAttribute("stroke", "#0F5CDE");
    spinePath.setAttribute("stroke-width", "6");
    spinePath.setAttribute("stroke-linecap", "round");
    spinePath.setAttribute("stroke-linejoin", "round");
    lineSvg.appendChild(spinePath);

    const spineLength = spinePath.getTotalLength();
    spinePath.style.strokeDasharray = spineLength;
    spinePath.style.strokeDashoffset = spineLength;

    dotEls.forEach(d => lineSvg.appendChild(d));

    const scrollContainer = document.getElementById("scrollContainer");
    const dimOverlay = document.getElementById("dimOverlay");
    const journeyText = document.getElementById("journeyText");

    // ============================================================
    // SPOTLIGHT - Line ki tip ko follow karta hai (scroll-driven)
    // Ye sirf dimOverlay ka background badalta hai, scrollContainer
    // ke transform ko touch nahi karta — isliye mobile-safe hai,
    // isme kuch change nahi kiya gaya.
    // ============================================================
    const BASE_DARK = 0.82;
    const REVEAL_RADIUS_PX = 260;
    const POS_EASE = 0.12;
    const REVEAL_EASE = 0.06;
    const RIGHT_OFFSET = 45;

    let targetX = 50, targetY = 50;
    let easedX = 50, easedY = 50;
    let targetReveal = 0;
    let easedReveal = 0;

    let isLineComplete = false;

    function spotlightLoop() {
        const currentOffset = parseFloat(spinePath.style.strokeDashoffset);
        const fraction = Math.min(1, Math.max(0, 1 - currentOffset / spineLength));

        isLineComplete = (fraction >= 1);

        const pt = spinePath.getPointAtLength(fraction * spineLength);
        targetX = ((pt.x + RIGHT_OFFSET) / 1624) * 100;
        targetY = (pt.y / 923) * 100;

        if (isLineComplete) {
            dimOverlay.style.background = "rgba(4,3,8,0)";
            easedX = targetX;
            easedY = targetY;
            easedReveal = 0;
            requestAnimationFrame(spotlightLoop);
            return;
        }

        const fadeIn = Math.min(1, fraction * 10);
        const fadeOut = 1 - Math.max(0, fraction - 0.97) * 50;
        targetReveal = fraction <= 0 ? 0 : Math.min(fadeIn, fadeOut);

        easedX += (targetX - easedX) * POS_EASE;
        easedY += (targetY - easedY) * POS_EASE;
        easedReveal += (targetReveal - easedReveal) * REVEAL_EASE;

        const innerAlpha = BASE_DARK * (1 - easedReveal);

        dimOverlay.style.background =
            "radial-gradient(circle " + REVEAL_RADIUS_PX + "px at " + easedX + "% " + easedY + "%, " +
            "rgba(4,3,8," + innerAlpha.toFixed(3) + ") 0%, " +
            "rgba(4,3,8," + (innerAlpha + (BASE_DARK - innerAlpha) * 0.55).toFixed(3) + ") 55%, " +
            "rgba(4,3,8," + BASE_DARK.toFixed(3) + ") 100%)";

        requestAnimationFrame(spotlightLoop);
    }
    requestAnimationFrame(spotlightLoop);

    // ============================================================
    // ZOOM CAMERA - SIRF DESKTOP ke liye use hota hai.
    // Mobile pe iska call skip kiya gaya hai kyunki isse
    // scrollContainer.style.transform set hota tha jo CSS ke
    // "rotate(90deg) scale(0.85) !important" se conflict karta
    // tha aur GSAP pin ka height-calculation bigad jata tha —
    // isi wajah se Metro (3rd) section scroll ke sath upar
    // chadh jata tha.
    // ============================================================
    const MAX_ZOOM = 3.42;

    function updateZoomFollow() {
        const currentOffset = parseFloat(spinePath.style.strokeDashoffset);
        const fraction = Math.min(1, Math.max(0, 1 - currentOffset / spineLength));

        const pt = spinePath.getPointAtLength(fraction * spineLength);
        const bx = (pt.x / 1624) * 100;
        const by = (pt.y / 923) * 100;

        scrollContainer.style.transformOrigin = bx + "% " + by + "%";
        const scale = 1 + fraction * (MAX_ZOOM - 1);
        scrollContainer.style.transform = "scale(" + scale + ")";
    }

    // ============================================================
    // MAIN FIX: matchMedia se desktop aur mobile ke liye
    // ALAG ALAG ScrollTrigger banaya gaya hai. Isse rotate(90deg)
    // wala CSS aur GSAP ka transform ek dusre se fight nahi
    // karte, aur pin ki scroll-distance (end value) bhi screen
    // ke hisaab se sahi set hoti hai — isi se Metro section ab
    // scroll ke sath upar chadhna band ho jayega.
    // ============================================================
    ScrollTrigger.matchMedia({

        // ---------- DESKTOP / TABLET (>=768px) — ORIGINAL BEHAVIOUR ----------
        "(min-width: 768px)": function () {

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: ".scroll-container",
                    start: "top top",
                    end: "+=2800",
                    scrub: 1.5,
                    pin: true,
                    anticipatePin: 1,
                    invalidateOnRefresh: true
                },
                defaults: { ease: "power1.inOut" }
            });

            if (dotEls.length) {
                tl.to(dotEls, {
                    opacity: 1,
                    duration: 0.8,
                    stagger: 0.12,
                    ease: "power2.out"
                }, 0);
            }

            tl.to(spinePath, {
                strokeDashoffset: 0,
                duration: 5,
                ease: "power1.inOut",
                onUpdate: updateZoomFollow
            }, 0);

            tl.to(scrollContainer, {
                scale: 1,
                transformOrigin: "50% 50%",
                duration: 1.8,
                ease: "power2.inOut"
            }, ">0.2")
            .fromTo(journeyText.querySelector("span"), {
                clipPath: "inset(0 100% 0 0)"
            }, {
                clipPath: "inset(0 0% 0 0)",
                duration: 1.6,
                ease: "power2.out"
            }, "-=0.8");

            // resize hoke mobile pe jaye toh yeh cleanup ho jayega
            return () => {
                if (tl.scrollTrigger) tl.scrollTrigger.kill();
                tl.kill();
            };
        },

        // ---------- MOBILE (<=767px) — FIXED, ROTATE-SAFE BEHAVIOUR ----------
        "(max-width: 767px)": function () {

            // Note: yahan scrollContainer.style.transform ko JS se
            // chhua nahi gaya — CSS ka rotate(90deg) scale(0.85)
            // !important hi apply hota rahega, koi conflict nahi.
            const tlMobile = gsap.timeline({
                scrollTrigger: {
                    trigger: ".scroll-container",
                    start: "top top",
                    end: "+=1200",      // mobile ke liye kam scroll-distance
                    scrub: 1.5,
                    pin: true,
                    anticipatePin: 1,
                    invalidateOnRefresh: true
                },
                defaults: { ease: "power1.inOut" }
            });

            if (dotEls.length) {
                tlMobile.to(dotEls, {
                    opacity: 1,
                    duration: 0.8,
                    stagger: 0.12,
                    ease: "power2.out"
                }, 0);
            }

            // Sirf line draw hoga, zoom-camera transform skip kiya
            tlMobile.to(spinePath, {
                strokeDashoffset: 0,
                duration: 5,
                ease: "power1.inOut"
            }, 0);

            tlMobile.fromTo(journeyText.querySelector("span"), {
                clipPath: "inset(0 100% 0 0)"
            }, {
                clipPath: "inset(0 0% 0 0)",
                duration: 1.6,
                ease: "power2.out"
            }, ">0.2");

            // resize hoke desktop pe jaye toh yeh cleanup ho jayega
            return () => {
                if (tlMobile.scrollTrigger) tlMobile.scrollTrigger.kill();
                tlMobile.kill();
            };
        }
    });
</script>
